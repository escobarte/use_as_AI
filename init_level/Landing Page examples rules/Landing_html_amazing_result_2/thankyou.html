<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You — Drive Your Business</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;600&family=Barlow+Condensed:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #c8a84b;
      --red: #C62828;
      --red-dark: #a01f1f;
      --dark: #0d0e12;
      --text: #f5f0e8;
      --text-dim: rgba(245,240,232,0.65);
      --text-faint: rgba(245,240,232,0.35);
    }
    body {
      background: var(--dark); color: var(--text);
      font-family: 'Barlow', sans-serif; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; text-align: center; padding: 40px 24px;
      position: relative; overflow: hidden;
    }
    /* Full background photo */
    .bg {
      position: fixed; inset: 0; z-index: 0;
      background-image: url('https://images.unsplash.com/photo-1519003300449-424ad0405076?w=1600&q=80');
      background-size: cover; background-position: center;
      filter: brightness(0.22);
    }
    /* Radial spotlight */
    .glow {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 700px; height: 700px; z-index: 1;
      background: radial-gradient(circle, rgba(200,168,75,0.09) 0%, transparent 65%);
      pointer-events: none;
    }

    .logo {
      position: fixed; top: 0; left: 0; right: 0; height: 64px;
      display: flex; align-items: center; padding: 0 48px;
      background: rgba(13,14,18,0.7); backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255,255,255,0.07); z-index: 10;
    }
    .logo a { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 15px; letter-spacing: 3px; text-transform: uppercase; color: var(--text); text-decoration: none; }

    .content { position: relative; z-index: 3; max-width: 520px; }

    /* Animated check */
    .check {
      width: 88px; height: 88px; border-radius: 50%;
      border: 1.5px solid var(--gold);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 36px;
      animation: pop 0.55s cubic-bezier(0.175,0.885,0.32,1.275) 0.25s both;
      background: rgba(200,168,75,0.07);
    }
    .check svg { width: 40px; height: 40px; }
    .check svg path { stroke: var(--gold); stroke-width: 2.5; fill: none; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 58; stroke-dashoffset: 58; animation: draw 0.4s ease 0.8s forwards; }

    @keyframes pop {
      from { opacity: 0; transform: scale(0.4); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes draw { to { stroke-dashoffset: 0; } }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(64px, 14vw, 112px);
      line-height: 0.9; letter-spacing: 3px; margin-bottom: 20px;
      animation: up 0.5s ease 0.55s both;
    }
    h1 em { color: var(--gold); font-style: normal; }
    p {
      font-size: 17px; font-weight: 300; color: var(--text-dim);
      line-height: 1.7; margin-bottom: 44px;
      animation: up 0.5s ease 0.7s both;
    }
    .btn {
      display: inline-block; background: var(--red); color: #fff;
      font-family: 'Bebas Neue', sans-serif; font-size: 17px; letter-spacing: 2px;
      padding: 14px 38px; border-radius: 6px; text-decoration: none;
      transition: background 0.2s, transform 0.2s;
      animation: up 0.5s ease 0.85s both;
    }
    .btn:hover { background: var(--red-dark); transform: translateY(-2px); }
    .sub-note {
      margin-top: 20px; font-family: 'Barlow Condensed', sans-serif;
      font-size: 12px; letter-spacing: 3px; text-transform: uppercase;
      color: var(--text-faint); animation: up 0.5s ease 1s both;
    }

    @keyframes up {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="glow"></div>

  <div class="logo"><a href="index.html">🚛 Drive Your Business</a></div>

  <div class="content">
    <div class="check">
      <svg viewBox="0 0 40 40"><path d="M7 20 L16 30 L33 12"/></svg>
    </div>
    <h1>Thank <em>You!</em></h1>
    <p>We received your request and will contact you within 24 hours. Get ready to attract more drivers.</p>
    <a class="btn" href="index.html">← Back to Home</a>
    <p class="sub-note">Drive Your Business · Trucking Marketing</p>
  </div>
</body>
</html>
